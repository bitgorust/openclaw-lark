stages:
  - verify

default:
  image: node:22
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  variables:
    PNPM_HOME: /root/.local/share/pnpm
    PNPM_STORE_DIR: .pnpm-store

lint:
  stage: verify
  script:
    - pnpm lint

format_check:
  stage: verify
  script:
    - pnpm format:check

typecheck:
  stage: verify
  script:
    - pnpm typecheck

test:
  stage: verify
  script:
    - pnpm test

build:
  stage: verify
  script:
    - pnpm build
