stages:
  - verify

.node_job: &node_job
  image: node:22
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile
  cache:
    key: pnpm
    paths:
      - .pnpm-store
  variables:
    PNPM_HOME: /root/.local/share/pnpm
    PNPM_STORE_DIR: .pnpm-store

lint:
  stage: verify
  <<: *node_job
  script:
    - pnpm lint

format_check:
  stage: verify
  <<: *node_job
  script:
    - pnpm format:check

typecheck:
  stage: verify
  <<: *node_job
  script:
    - pnpm typecheck

test:
  stage: verify
  <<: *node_job
  script:
    - pnpm test

build:
  stage: verify
  <<: *node_job
  script:
    - pnpm build
